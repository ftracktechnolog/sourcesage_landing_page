<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="tnvBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="tnvBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78716c"/>
      <stop offset="100%" style="stop-color:#57534e"/>
    </linearGradient>
    <filter id="shadowTnv">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#tnvBg)"/>
  <!-- Subtle grid -->
  <g stroke="#e2e8f0" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>
  <!-- Mini excavator silhouette (background) -->
  <g transform="translate(500, 200)" opacity="0.08">
    <path d="M20,80 L20,160 L160,160 Q180,160 180,140 L180,80 Z" fill="none" stroke="#475569" stroke-width="3"/>
    <path d="M100,20 L100,80 L160,80" fill="none" stroke="#475569" stroke-width="3"/>
    <line x1="100" y1="20" x2="60" y2="60" stroke="#475569" stroke-width="3"/>
    <line x1="60" y1="60" x2="30" y2="100" stroke="#475569" stroke-width="3"/>
    <circle cx="60" cy="160" r="18" fill="none" stroke="#475569" stroke-width="3"/>
    <circle cx="160" cy="160" r="18" fill="none" stroke="#475569" stroke-width="3"/>
  </g>
  <!-- 3TNV88 Engine block — compact 3-cylinder -->
  <g transform="translate(140, 130)" filter="url(#shadowTnv)">
    <!-- Block -->
    <rect x="0" y="40" width="320" height="150" rx="6" fill="url(#tnvBlock)"/>
    <rect x="0" y="40" width="320" height="150" rx="6" fill="none" stroke="#44403c" stroke-width="2"/>
    <!-- Cylinder head -->
    <rect x="0" y="10" width="320" height="40" rx="4" fill="#a8a29e"/>
    <rect x="0" y="10" width="320" height="40" rx="4" fill="none" stroke="#78716c" stroke-width="2"/>
    <!-- Valve cover — Yanmar red accent -->
    <rect x="40" y="10" width="240" height="15" rx="3" fill="#ef4444" opacity="0.6"/>
    <!-- Cylinders (3) -->
    <g fill="#1c1917" opacity="0.5">
      <ellipse cx="55" cy="115" rx="30" ry="55"/>
      <ellipse cx="160" cy="115" rx="30" ry="55"/>
      <ellipse cx="265" cy="115" rx="30" ry="55"/>
    </g>
    <!-- Cylinder labels -->
    <text x="55" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a8a29e">1</text>
    <text x="160" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a8a29e">2</text>
    <text x="265" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a8a29e">3</text>
    <!-- Head bolts -->
    <g fill="#78716c">
      <circle cx="25" cy="30" r="3"/>
      <circle cx="295" cy="30" r="3"/>
      <circle cx="95" cy="30" r="3"/>
      <circle cx="200" cy="30" r="3"/>
    </g>
    <!-- Timing belt cover (left side) -->
    <rect x="-35" y="55" width="35" height="80" rx="3" fill="#57534e"/>
    <rect x="-35" y="55" width="35" height="80" rx="3" fill="none" stroke="#44403c" stroke-width="1.5"/>
    <circle cx="-17" cy="95" r="18" fill="none" stroke="#78716c" stroke-width="2"/>
    <!-- Belt tension indicator -->
    <path d="M-25,65 L-10,65" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <!-- Exhaust manifold (right) -->
    <rect x="320" y="60" width="30" height="50" rx="3" fill="#78716c" opacity="0.7"/>
    <rect x="320" y="60" width="30" height="50" rx="3" fill="none" stroke="#57534e" stroke-width="1.5"/>
    <!-- Oil pan -->
    <rect x="25" y="175" width="270" height="30" rx="3" fill="#44403c"/>
    <rect x="25" y="175" width="270" height="30" rx="3" fill="none" stroke="#292524" stroke-width="1.5"/>
    <!-- Flywheel -->
    <rect x="320" y="120" width="15" height="45" rx="3" fill="#78716c"/>
    <circle cx="328" cy="142" r="12" fill="none" stroke="#57534e" stroke-width="2"/>
  </g>
  <!-- Label: 3TNV88 -->
  <g transform="translate(210, 80)">
    <rect width="110" height="28" rx="14" fill="#1c1917"/>
    <text x="55" y="19" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="13" fill="#ef4444">3TNV88</text>
  </g>
  <!-- Details -->
  <g transform="translate(100, 340)">
    <rect width="120" height="24" rx="12" fill="#ef4444" opacity="0.1"/>
    <text x="60" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#ef4444">3-Cylinder · 1.5L</text>
  </g>
  <g transform="translate(240, 340)">
    <rect width="100" height="24" rx="12" fill="#1c1917" opacity="0.6"/>
    <text x="50" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#a8a29e">Tier 4 Compliant</text>
  </g>
  <g transform="translate(360, 340)">
    <rect width="100" height="24" rx="12" fill="#1c1917" opacity="0.6"/>
    <text x="50" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#a8a29e">24–30 HP</text>
  </g>
  <!-- Timing belt warning -->
  <g transform="translate(540, 150)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="11" fill="#ef4444">⚠ TIMING BELT</text>
    <text x="80" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Replace every 2,000 hrs</text>
    <text x="80" y="54" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Snapped belt = engine damage</text>
  </g>
  <!-- Common applications -->
  <g transform="translate(540, 240)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#f8fafc" filter="url(#shadowTnv)"/>
    <text x="80" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="11" fill="#475569">Common Applications</text>
    <text x="80" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Mini excavators · Loaders</text>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Light construction</text>
  </g>
  <!-- Bottom text -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Yanmar 3TNV88 — compact three-cylinder diesel in John Deere, Case, Yanmar &amp; Takeuchi mini excavators</text>
</svg>
