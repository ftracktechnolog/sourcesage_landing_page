<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="300" cy="520" r="350" fill="url(#glow)"/>
  <!-- Magnifying glass -->
  <g transform="translate(280, 170)">
    <circle cx="120" cy="120" r="95" fill="none" stroke="#f59e0b" stroke-width="8"/>
    <circle cx="120" cy="120" r="90" fill="#f59e0b" opacity="0.08"/>
    <line x1="190" y1="190" x2="280" y2="280" stroke="#f59e0b" stroke-width="12" stroke-linecap="round"/>
    <!-- Gear inside magnifying glass -->
    <circle cx="120" cy="120" r="40" fill="none" stroke="#60a5fa" stroke-width="4"/>
    <circle cx="120" cy="120" r="8" fill="#60a5fa" opacity="0.6"/>
    <g stroke="#60a5fa" stroke-width="4">
      <line x1="120" y1="72" x2="120" y2="58"/>
      <line x1="120" y1="168" x2="120" y2="182"/>
      <line x1="72" y1="120" x2="58" y2="120"/>
      <line x1="168" y1="120" x2="182" y2="120"/>
      <line x1="86" y1="86" x2="76" y2="76"/>
      <line x1="154" y1="154" x2="164" y2="164"/>
      <line x1="86" y1="154" x2="76" y2="164"/>
      <line x1="154" y1="86" x2="164" y2="76"/>
    </g>
  </g>
  <!-- Parts scattered around -->
  <g fill="#475569" opacity="0.6">
    <rect x="650" y="200" width="50" height="30" rx="4" transform="rotate(-15, 675, 215)"/>
    <rect x="750" y="280" width="40" height="20" rx="3" transform="rotate(25, 770, 290)"/>
    <circle cx="700" cy="350" r="18"/>
    <rect x="800" y="200" width="35" height="35" rx="5" transform="rotate(45, 817, 217)"/>
    <circle cx="680" cy="250" r="10" fill="#3b82f6" opacity="0.3"/>
  </g>
  <!-- Checkmark -->
  <g transform="translate(760, 380)">
    <circle cx="50" cy="50" r="40" fill="#22c55e" opacity="0.15"/>
    <polyline points="30,50 45,65 70,35" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title text -->
  <text x="600" y="550" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="38" fill="#ffffff">Hard-to-Find Tractor Parts Malaysia</text>
  <text x="600" y="595" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="22" fill="#94a3b8">We Source What Local Dealers Can't — Discontinued, Vintage & Niche</text>
</svg>
