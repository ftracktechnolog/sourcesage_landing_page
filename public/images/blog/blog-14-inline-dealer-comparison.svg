<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="compBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadowCmp">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#compBg)"/>
  <!-- Left panel — Local Dealer -->
  <g transform="translate(30, 40)">
    <rect width="350" height="420" rx="10" fill="#ffffff" filter="url(#shadowCmp)"/>
    <!-- Header -->
    <rect x="0" y="0" width="350" height="55" rx="10" fill="#f1f5f9"/>
    <rect x="0" y="35" width="350" height="20" fill="#f1f5f9"/>
    <circle cx="30" cy="28" r="8" fill="#94a3b8" opacity="0.5"/>
    <text x="50" y="32" font-family="system-ui,sans-serif" font-weight="700" font-size="16" fill="#64748b">Local Dealer</text>
    <!-- Row: Stock -->
    <g transform="translate(20, 80)">
      <circle cx="12" cy="12" r="10" fill="#fee2e2"/>
      <line x1="7" y1="7" x2="17" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="7" x2="7" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">High-turnover consumables only</text>
    </g>
    <line x1="20" y1="108" x2="330" y2="108" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Discontinued -->
    <g transform="translate(20, 125)">
      <circle cx="12" cy="12" r="10" fill="#fee2e2"/>
      <line x1="7" y1="7" x2="17" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="7" x2="7" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">Discontinued parts generally unavailable</text>
    </g>
    <line x1="20" y1="153" x2="330" y2="153" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Response -->
    <g transform="translate(20, 170)">
      <circle cx="12" cy="12" r="10" fill="#fee2e2"/>
      <line x1="7" y1="7" x2="17" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="7" x2="7" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">2–6 weeks for non-stock items</text>
    </g>
    <line x1="20" y1="198" x2="330" y2="198" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Brand -->
    <g transform="translate(20, 215)">
      <circle cx="12" cy="12" r="10" fill="#fee2e2"/>
      <line x1="7" y1="7" x2="17" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="7" x2="7" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">Single brand only</text>
    </g>
    <line x1="20" y1="243" x2="330" y2="243" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Vintage -->
    <g transform="translate(20, 260)">
      <circle cx="12" cy="12" r="10" fill="#fee2e2"/>
      <line x1="7" y1="7" x2="17" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="7" x2="7" y2="17" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">Limited vintage / older model support</text>
    </g>
    <!-- Score at bottom -->
    <g transform="translate(130, 330)">
      <text x="45" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="14" fill="#ef4444">LIMITED COVERAGE</text>
    </g>
  </g>
  <!-- VS badge -->
  <g transform="translate(380, 225)">
    <circle cx="20" cy="20" r="22" fill="#1e293b"/>
    <circle cx="20" cy="20" r="19" fill="#334155"/>
    <text x="20" y="25" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="12" fill="#e2e8f0">VS</text>
  </g>
  <!-- Right panel — SourceSage -->
  <g transform="translate(420, 40)">
    <rect width="350" height="420" rx="10" fill="#ffffff" filter="url(#shadowCmp)"/>
    <!-- Header -->
    <rect x="0" y="0" width="350" height="55" rx="10" fill="#eff6ff"/>
    <rect x="0" y="35" width="350" height="20" fill="#eff6ff"/>
    <circle cx="30" cy="28" r="8" fill="#3b82f6" opacity="0.5"/>
    <text x="50" y="32" font-family="system-ui,sans-serif" font-weight="700" font-size="16" fill="#2563eb">SourceSage</text>
    <!-- Row: Stock -->
    <g transform="translate(20, 80)">
      <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
      <polyline points="7,12 11,16 17,8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">Multi-supplier search across Asia</text>
    </g>
    <line x1="20" y1="108" x2="330" y2="108" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Discontinued -->
    <g transform="translate(20, 125)">
      <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
      <polyline points="7,12 11,16 17,8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">Actively sourced via secondary dealers</text>
    </g>
    <line x1="20" y1="153" x2="330" y2="153" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Response -->
    <g transform="translate(20, 170)">
      <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
      <polyline points="7,12 11,16 17,8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">24–48 hour availability check</text>
    </g>
    <line x1="20" y1="198" x2="330" y2="198" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Brand -->
    <g transform="translate(20, 215)">
      <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
      <polyline points="7,12 11,16 17,8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">6 major brands covered</text>
    </g>
    <line x1="20" y1="243" x2="330" y2="243" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Row: Vintage -->
    <g transform="translate(20, 260)">
      <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
      <polyline points="7,12 11,16 17,8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="35" y="17" font-family="system-ui,sans-serif" font-size="14" fill="#334155">Japan secondary dealer network</text>
    </g>
    <!-- Score at bottom -->
    <g transform="translate(130, 330)">
      <text x="45" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="14" fill="#22c55e">FULL COVERAGE</text>
    </g>
  </g>
  <!-- Bottom text -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Hard-to-find parts: Local dealers can't match SourceSage's multi-supplier network</text>
</svg>
