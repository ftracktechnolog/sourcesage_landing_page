<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgShop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="counterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <filter id="shadowInl">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Background wall -->
  <rect width="800" height="500" fill="url(#bgShop)"/>
  <!-- Shelf on wall -->
  <rect x="0" y="60" width="800" height="8" fill="#cbd5e1"/>
  <rect x="0" y="62" width="800" height="4" fill="#94a3b8" opacity="0.5"/>
  <!-- Items on shelf -->
  <rect x="80" y="20" width="30" height="40" rx="3" fill="#3b82f6" opacity="0.6"/>
  <rect x="130" y="25" width="20" height="35" rx="2" fill="#64748b" opacity="0.5"/>
  <rect x="170" y="15" width="35" height="45" rx="3" fill="#f59e0b" opacity="0.4"/>
  <rect x="600" y="20" width="40" height="40" rx="3" fill="#3b82f6" opacity="0.5"/>
  <rect x="660" y="25" width="25" height="35" rx="2" fill="#64748b" opacity="0.4"/>
  <rect x="700" y="18" width="30" height="42" rx="3" fill="#22c55e" opacity="0.3"/>
  <!-- Upper shelf -->
  <rect x="0" y="20" width="800" height="6" fill="#e2e8f0"/>
  <!-- Workbench / counter -->
  <rect x="50" y="350" width="700" height="25" rx="3" fill="url(#counterGrad)"/>
  <rect x="50" y="375" width="700" height="120" fill="#334155" opacity="0.9"/>
  <rect x="50" y="375" width="700" height="4" fill="#475569"/>
  <!-- Counter top edge highlight -->
  <rect x="50" y="347" width="700" height="3" rx="1" fill="#cbd5e1" opacity="0.5"/>
  <!-- Parts on counter -->
  <g filter="url(#shadowInl)">
    <!-- Diesel injector -->
    <rect x="180" y="300" width="14" height="50" rx="4" fill="#475569"/>
    <rect x="176" y="295" width="22" height="10" rx="2" fill="#64748b"/>
    <rect x="182" y="305" width="10" height="2" fill="#94a3b8"/>
    <rect x="182" y="312" width="10" height="2" fill="#94a3b8"/>
    <rect x="182" y="319" width="10" height="2" fill="#94a3b8"/>
    <!-- Piston -->
    <rect x="260" y="305" width="30" height="45" rx="5" fill="#94a3b8"/>
    <rect x="256" y="300" width="38" height="10" rx="2" fill="#cbd5e1"/>
    <circle cx="275" cy="310" r="3" fill="#64748b"/>
    <circle cx="275" cy="320" r="3" fill="#64748b"/>
    <circle cx="275" cy="330" r="3" fill="#64748b"/>
    <!-- Gasket / Seal ring -->
    <circle cx="370" cy="330" r="20" fill="none" stroke="#3b82f6" stroke-width="4"/>
    <circle cx="370" cy="330" r="16" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <!-- Bolt / fastener -->
    <circle cx="450" cy="325" r="10" fill="#64748b"/>
    <circle cx="450" cy="325" r="6" fill="#94a3b8"/>
    <line x1="450" y1="317" x2="450" y2="333" stroke="#475569" stroke-width="1.5"/>
    <line x1="442" y1="325" x2="458" y2="325" stroke="#475569" stroke-width="1.5"/>
    <!-- Small parts box -->
    <rect x="530" y="300" width="50" height="50" rx="3" fill="#1e293b"/>
    <rect x="535" y="305" width="40" height="40" rx="2" fill="#334155"/>
    <circle cx="550" cy="320" r="4" fill="#60a5fa" opacity="0.6"/>
    <circle cx="562" cy="320" r="4" fill="#60a5fa" opacity="0.6"/>
    <circle cx="550" cy="330" r="4" fill="#60a5fa" opacity="0.6"/>
    <circle cx="562" cy="330" r="4" fill="#60a5fa" opacity="0.6"/>
  </g>
  <!-- Urgency badge on wall -->
  <g transform="translate(620, 100)">
    <rect width="120" height="40" rx="6" fill="#ef4444" opacity="0.15"/>
    <rect x="1" y="1" width="118" height="38" rx="5" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="60" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="14" fill="#ef4444">URGENT STOCK</text>
  </g>
  <!-- Price tag labels -->
  <g transform="translate(80, 270)" opacity="0.6">
    <rect width="50" height="20" rx="3" fill="#f59e0b" opacity="0.2"/>
    <text x="25" y="14" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b">AVAILABLE</text>
  </g>
  <g transform="translate(480, 270)" opacity="0.6">
    <rect width="50" height="20" rx="3" fill="#22c55e" opacity="0.2"/>
    <text x="25" y="14" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">IN STOCK</text>
  </g>
  <!-- Label text at bottom -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">SourceSage keeps urgent-stock parts ready across Malaysia — injectors, pistons, gaskets, seals</text>
</svg>
