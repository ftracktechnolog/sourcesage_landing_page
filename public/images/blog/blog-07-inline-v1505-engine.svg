<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="engineBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="engineBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <filter id="shadowEng">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#engineBg)"/>
  <!-- Subtle grid pattern -->
  <g stroke="#e2e8f0" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>
  <!-- Engine block — main body -->
  <g transform="translate(200, 150)" filter="url(#shadowEng)">
    <!-- Block -->
    <rect x="0" y="30" width="400" height="160" rx="6" fill="url(#engineBlock)"/>
    <rect x="0" y="30" width="400" height="160" rx="6" fill="none" stroke="#334155" stroke-width="2"/>
    <!-- Cylinder head -->
    <rect x="0" y="0" width="400" height="40" rx="4" fill="#94a3b8"/>
    <rect x="0" y="0" width="400" height="40" rx="4" fill="none" stroke="#64748b" stroke-width="2"/>
    <!-- Valve cover -->
    <rect x="40" y="0" width="320" height="15" rx="3" fill="#3b82f6" opacity="0.6"/>
    <!-- Cylinders (4) -->
    <g fill="#1e293b" opacity="0.5">
      <ellipse cx="55" cy="110" rx="30" ry="55"/>
      <ellipse cx="145" cy="110" rx="30" ry="55"/>
      <ellipse cx="235" cy="110" rx="30" ry="55"/>
      <ellipse cx="325" cy="110" rx="30" ry="55"/>
    </g>
    <!-- Cylinder labels -->
    <text x="55" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">1</text>
    <text x="145" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">2</text>
    <text x="235" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">3</text>
    <text x="325" y="115" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">4</text>
    <!-- Head bolts -->
    <g fill="#64748b">
      <circle cx="25" cy="20" r="3"/>
      <circle cx="375" cy="20" r="3"/>
      <circle cx="90" cy="20" r="3"/>
      <circle cx="180" cy="20" r="3"/>
      <circle cx="270" cy="20" r="3"/>
      <circle cx="355" cy="20" r="3"/>
    </g>
    <!-- Intake manifold side -->
    <rect x="-40" y="50" width="40" height="60" rx="3" fill="#94a3b8" opacity="0.7"/>
    <rect x="-40" y="50" width="40" height="60" rx="3" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <!-- Exhaust manifold side -->
    <rect x="400" y="50" width="40" height="60" rx="3" fill="#78716c" opacity="0.7"/>
    <rect x="400" y="50" width="40" height="60" rx="3" fill="none" stroke="#57534e" stroke-width="1.5"/>
    <!-- Oil pan -->
    <rect x="20" y="175" width="360" height="30" rx="3" fill="#334155"/>
    <rect x="20" y="175" width="360" height="30" rx="3" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <!-- Flywheel end -->
    <rect x="400" y="120" width="20" height="55" rx="3" fill="#64748b"/>
    <circle cx="410" cy="147" r="15" fill="none" stroke="#475569" stroke-width="2"/>
    <!-- Pulley end -->
    <rect x="-20" y="120" width="20" height="55" rx="3" fill="#64748b"/>
    <circle cx="-10" cy="142" r="15" fill="none" stroke="#475569" stroke-width="2"/>
    <circle cx="-10" cy="142" r="5" fill="#475569"/>
  </g>
  <!-- Label: V1505 -->
  <g transform="translate(370, 80)">
    <rect width="100" height="28" rx="14" fill="#1e293b"/>
    <text x="50" y="19" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="13" fill="#60a5fa">V1505-E</text>
  </g>
  <!-- Label: 4-cylinder -->
  <g transform="translate(230, 330)">
    <rect width="100" height="24" rx="12" fill="#2563eb" opacity="0.1"/>
    <text x="50" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#2563eb">4-Cylinder · 1.5L</text>
  </g>
  <!-- Label: Diesel -->
  <g transform="translate(370, 330)">
    <rect width="80" height="24" rx="12" fill="#1e293b" opacity="0.6"/>
    <text x="40" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#94a3b8">Diesel DI</text>
  </g>
  <!-- Power rating -->
  <g transform="translate(540, 200)">
    <rect width="110" height="50" rx="6" fill="#f8fafc" filter="url(#shadowEng)"/>
    <text x="55" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="11" fill="#475569">Power Output</text>
    <text x="55" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="18" fill="#2563eb">27–33 HP</text>
  </g>
  <!-- Specs -->
  <g transform="translate(540, 270)">
    <rect width="110" height="50" rx="6" fill="#f8fafc" filter="url(#shadowEng)"/>
    <text x="55" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="11" fill="#475569">Displacement</text>
    <text x="55" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="18" fill="#2563eb">1,499 cc</text>
  </g>
  <!-- Bottom text -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Kubota V1505 — four-cylinder diesel engine used in L-series tractors, generators &amp; compact machinery</text>
</svg>
