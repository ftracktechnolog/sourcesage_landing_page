<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2640"/>
      <stop offset="60%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="shadowAF">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="planeBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="50%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>
  <!-- Stars -->
  <circle cx="100" cy="40" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="250" cy="60" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="400" cy="30" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="550" cy="55" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="700" cy="35" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="150" cy="80" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="650" cy="75" r="1" fill="#ffffff" opacity="0.4"/>
  <!-- Moon -->
  <circle cx="680" cy="80" r="25" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="688" cy="75" r="22" fill="#0f2640"/>
  <!-- Runway / ground -->
  <rect x="-50" y="350" width="900" height="150" fill="url(#groundGrad)"/>
  <!-- Runway lines -->
  <rect x="-50" y="390" width="900" height="6" fill="#475569" opacity="0.3"/>
  <rect x="-50" y="430" width="900" height="6" fill="#475569" opacity="0.3"/>
  <!-- Runway center dashes -->
  <g fill="#f59e0b" opacity="0.4">
    <rect x="50" y="380" width="30" height="3"/>
    <rect x="130" y="380" width="30" height="3"/>
    <rect x="210" y="380" width="30" height="3"/>
    <rect x="290" y="380" width="30" height="3"/>
    <rect x="370" y="380" width="30" height="3"/>
    <rect x="450" y="380" width="30" height="3"/>
    <rect x="530" y="380" width="30" height="3"/>
    <rect x="610" y="380" width="30" height="3"/>
    <rect x="690" y="380" width="30" height="3"/>
    <rect x="770" y="380" width="30" height="3"/>
  </g>
  <!-- Cargo plane on tarmac -->
  <g transform="translate(200, 280)" filter="url(#shadowAF)">
    <!-- Fuselage -->
    <ellipse cx="200" cy="30" rx="120" ry="18" fill="url(#planeBody)"/>
    <!-- Cockpit -->
    <path d="M310,22 Q330,30 310,38 Z" fill="#475569"/>
    <!-- Tail -->
    <path d="M80,10 L70,-30 L100,0 Z" fill="#64748b"/>
    <path d="M75,-30 L90,-32 L100,0 Z" fill="#475569"/>
    <!-- Horizontal stabilizer -->
    <path d="M70,25 L40,15 L40,35 Z" fill="#64748b"/>
    <!-- Wings -->
    <path d="M170,30 L120,-20 L130,-20 L190,25 Z" fill="#475569"/>
    <path d="M230,30 L280,-20 L270,-20 L210,25 Z" fill="#475569"/>
    <!-- Engines -->
    <rect x="150" y="-5" width="25" height="10" rx="3" fill="#334155"/>
    <rect x="230" y="-5" width="25" height="10" rx="3" fill="#334155"/>
    <!-- Cargo door outline -->
    <rect x="130" y="15" width="40" height="28" rx="2" fill="none" stroke="#475569" stroke-width="1.5"/>
    <!-- Window -->
    <circle cx="295" cy="28" r="4" fill="#60a5fa" opacity="0.6"/>
    <!-- Red cargo package on tarmac -->
    <rect x="350" y="20" width="25" height="20" rx="2" fill="#ef4444" opacity="0.7"/>
    <rect x="350" y="20" width="25" height="4" fill="#dc2626"/>
    <rect x="412" y="22" width="20" height="18" rx="2" fill="#f59e0b" opacity="0.6"/>
  </g>
  <!-- Motion lines behind plane -->
  <g stroke="#60a5fa" stroke-width="2" opacity="0.3">
    <line x1="50" y1="310" x2="100" y2="310"/>
    <line x1="30" y1="318" x2="100" y2="318"/>
    <line x1="40" y1="326" x2="100" y2="326"/>
  </g>
  <!-- Label badges -->
  <g transform="translate(560, 200)">
    <rect width="90" height="55" rx="6" fill="#1e293b" opacity="0.8"/>
    <rect x="1" y="1" width="88" height="53" rx="5" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
    <text x="45" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="14" fill="#3b82f6">AIR FREIGHT</text>
    <text x="45" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#94a3b8">3–7 days</text>
  </g>
  <g transform="translate(560, 265)">
    <rect width="90" height="55" rx="6" fill="#1e293b" opacity="0.8"/>
    <rect x="1" y="1" width="88" height="53" rx="5" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <text x="45" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="12" fill="#22c55e">SEA FREIGHT</text>
    <text x="45" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#94a3b8">14–21 days</text>
  </g>
  <!-- Bottom text -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#475569">Air freight 3–7 working days · Sea freight 14–21 days · Local courier 1–3 days</text>
</svg>
