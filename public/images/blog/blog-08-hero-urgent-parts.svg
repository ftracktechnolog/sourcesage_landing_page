<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2640"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0c1f33"/>
    </linearGradient>
    <linearGradient id="urgentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow8">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg8)"/>
  <circle cx="200" cy="200" r="320" fill="url(#urgentGlow)"/>
  <circle cx="1000" cy="500" r="300" fill="url(#blueGlow)"/>
  <!-- Tractor silhouette — side view, detailed -->
  <g transform="translate(140, 240)" filter="url(#shadow8)">
    <!-- Main body / hood -->
    <path d="M80,60 L80,130 L350,130 Q380,130 380,100 L380,60 Z" fill="#2563eb" opacity="0.9"/>
    <!-- Cab -->
    <rect x="160" y="0" width="130" height="65" rx="8" fill="#3b82f6" opacity="0.8"/>
    <rect x="170" y="10" width="50" height="35" rx="4" fill="#60a5fa" opacity="0.3"/>
    <rect x="235" y="10" width="45" height="35" rx="4" fill="#60a5fa" opacity="0.3"/>
    <!-- Cab roof -->
    <rect x="155" y="-2" width="140" height="8" rx="3" fill="#1d4ed8" opacity="0.7"/>
    <!-- Engine hood detail -->
    <rect x="80" y="70" width="80" height="55" rx="4" fill="#1d4ed8" opacity="0.5"/>
    <!-- Grille -->
    <rect x="80" y="65" width="12" height="55" rx="2" fill="#1e293b"/>
    <line x1="82" y1="72" x2="92" y2="72" stroke="#475569" stroke-width="1.5"/>
    <line x1="82" y1="78" x2="92" y2="78" stroke="#475569" stroke-width="1.5"/>
    <line x1="82" y1="84" x2="92" y2="84" stroke="#475569" stroke-width="1.5"/>
    <line x1="82" y1="90" x2="92" y2="90" stroke="#475569" stroke-width="1.5"/>
    <!-- Exhaust stack -->
    <rect x="340" y="5" width="10" height="55" rx="3" fill="#64748b"/>
    <rect x="337" y="5" width="16" height="6" rx="2" fill="#94a3b8"/>
    <!-- Large rear wheel -->
    <circle cx="200" cy="130" r="48" fill="#0f172a"/>
    <circle cx="200" cy="130" r="36" fill="#1e293b"/>
    <circle cx="200" cy="130" r="28" fill="#334155"/>
    <circle cx="200" cy="130" r="8" fill="#64748b"/>
    <!-- Tread lines on rear wheel -->
    <g stroke="#475569" stroke-width="2" opacity="0.5">
      <line x1="200" y1="84" x2="200" y2="72"/>
      <line x1="200" y1="176" x2="200" y2="188"/>
      <line x1="152" y1="130" x2="140" y2="130"/>
      <line x1="248" y1="130" x2="260" y2="130"/>
      <line x1="166" y1="96" x2="158" y2="88"/>
      <line x1="234" y1="164" x2="242" y2="172"/>
      <line x1="166" y1="164" x2="158" y2="172"/>
      <line x1="234" y1="96" x2="242" y2="88"/>
    </g>
    <!-- Small front wheel -->
    <circle cx="360" cy="130" r="30" fill="#0f172a"/>
    <circle cx="360" cy="130" r="20" fill="#334155"/>
    <circle cx="360" cy="130" r="6" fill="#64748b"/>
    <!-- Ground line -->
    <line x1="50" y1="150" x2="440" y2="150" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="50" y1="152" x2="440" y2="152" stroke="#475569" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  </g>
  <!-- Red urgency badge -->
  <g transform="translate(440, 200)">
    <circle cx="70" cy="70" r="65" fill="#ef4444" opacity="0.1"/>
    <circle cx="70" cy="70" r="58" fill="none" stroke="#ef4444" stroke-width="5" stroke-dasharray="8,4"/>
    <circle cx="70" cy="70" r="45" fill="#ef4444" opacity="0.15"/>
    <!-- Clock hands -->
    <line x1="70" y1="70" x2="70" y2="35" stroke="#ef4444" stroke-width="4" stroke-linecap="round" filter="url(#glowFilter)"/>
    <line x1="70" y1="70" x2="98" y2="60" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <circle cx="70" cy="70" r="5" fill="#fca5a5"/>
    <!-- Exclamation -->
    <text x="70" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="28" fill="#ef4444" filter="url(#glowFilter)">24HR</text>
  </g>
  <!-- Parts / gear icons floating -->
  <g opacity="0.3">
    <circle cx="680" cy="180" r="15" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="680" cy="180" r="5" fill="#60a5fa"/>
    <rect x="730" y="160" width="25" height="15" rx="3" fill="none" stroke="#60a5fa" stroke-width="2" transform="rotate(20, 742, 167)"/>
    <circle cx="820" cy="190" r="12" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <rect x="770" y="200" width="20" height="10" rx="2" fill="none" stroke="#60a5fa" stroke-width="2" transform="rotate(-10, 780, 205)"/>
  </g>
  <!-- Map of Malaysia outline hint -->
  <g transform="translate(680, 280)" opacity="0.12" stroke="#60a5fa" stroke-width="2" fill="none">
    <path d="M30,10 Q50,5 80,8 Q120,12 150,20 Q170,25 180,40 Q185,55 175,70 Q160,85 130,90 Q100,92 70,88 Q40,82 25,70 Q10,55 15,35 Q18,18 30,10 Z"/>
    <path d="M190,35 Q210,30 230,38 Q240,50 235,65 Q225,75 210,70 Q195,62 190,50 Z"/>
    <circle cx="100" cy="55" r="3" fill="#3b82f6" opacity="0.5"/>
  </g>
  <!-- Delivery truck icon -->
  <g transform="translate(740, 340)" opacity="0.4">
    <rect x="10" y="25" width="120" height="40" rx="4" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <rect x="75" y="15" width="55" height="30" rx="3" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="45" cy="65" r="12" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="105" cy="65" r="12" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <path d="M10,30 L-5,40 L-5,65" fill="none" stroke="#94a3b8" stroke-width="2"/>
  </g>
  <!-- Speed / motion lines -->
  <g stroke="#ef4444" stroke-width="2" opacity="0.4">
    <line x1="880" y1="380" x2="920" y2="380"/>
    <line x1="870" y1="395" x2="930" y2="395"/>
    <line x1="880" y1="410" x2="920" y2="410"/>
  </g>
  <!-- Title text -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="36" fill="#ffffff">Need Urgent Tractor Spare Parts?</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="20" fill="#93c5fd">SourceSage confirms availability within 24–48 hours. Air freight nationwide.</text>
  <!-- Brand strip -->
  <g transform="translate(250, 632)">
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Kubota · Yanmar · Massey Ferguson · John Deere · Perkins · Zoomlion</text>
  </g>
</svg>
