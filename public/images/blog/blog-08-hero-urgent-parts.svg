<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2640"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="900" cy="150" r="300" fill="url(#glow)"/>
  <!-- Tractor silhouette -->
  <g transform="translate(250, 280)">
    <!-- Body -->
    <rect x="80" y="40" width="280" height="100" rx="12" fill="#3b82f6" opacity="0.9"/>
    <rect x="300" y="60" width="100" height="80" rx="8" fill="#2563eb" opacity="0.8"/>
    <!-- Cab -->
    <rect x="100" y="0" width="140" height="50" rx="6" fill="#60a5fa" opacity="0.7"/>
    <!-- Exhaust -->
    <rect x="340" y="10" width="12" height="50" rx="4" fill="#64748b"/>
    <!-- Wheel large -->
    <circle cx="160" cy="145" r="45" fill="#1e293b"/>
    <circle cx="160" cy="145" r="30" fill="#334155"/>
    <circle cx="160" cy="145" r="8" fill="#64748b"/>
    <!-- Wheel small -->
    <circle cx="370" cy="145" r="30" fill="#1e293b"/>
    <circle cx="370" cy="145" r="18" fill="#334155"/>
    <circle cx="370" cy="145" r="5" fill="#64748b"/>
    <!-- Ground -->
    <line x1="0" y1="160" x2="460" y2="160" stroke="#475569" stroke-width="2" stroke-dasharray="8,8"/>
  </g>
  <!-- Urgency clock icon -->
  <g transform="translate(750, 220)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#ef4444" stroke-width="6"/>
    <circle cx="60" cy="60" r="50" fill="#ef4444" opacity="0.1"/>
    <line x1="60" y1="60" x2="60" y2="25" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="85" y2="70" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="60" r="4" fill="#ef4444"/>
    <!-- Motion lines -->
    <line x1="125" y1="40" x2="145" y2="30" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="60" x2="150" y2="60" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
    <line x1="125" y1="80" x2="145" y2="90" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Title text -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="38" fill="#ffffff">Need Urgent Tractor Spare Parts</text>
  <text x="600" y="625" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="22" fill="#94a3b8">Fast Sourcing Across Malaysia — Ship Nationwide</text>
</svg>
